    <title>Grandmaster Elite</title>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(35, 40, 52, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .gold-glow {
            text-shadow: 0 0 15px rgba(240, 191, 92, 0.4);
        }
        .button-glow:hover {
            box-shadow: 0 0 15px rgba(200, 155, 60, 0.4);
        }
        .chess-pattern {
            background-image: radial-gradient(rgba(240, 191, 92, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
    </style>
